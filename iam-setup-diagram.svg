<svg width="880" height="560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="880" height="560" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F4E79">AWS IAM Setup with Terraform -- Role-Based Access Control Architecture</text>

  <!-- Terraform IaC label top left -->
  <rect x="30" y="50" width="150" height="44" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5" rx="6"/>
  <text x="105" y="69" text-anchor="middle" font-size="11" font-weight="bold" fill="#00695C">Terraform IaC</text>
  <text x="105" y="86" text-anchor="middle" font-size="10" fill="#444">Variables + Outputs</text>

  <!-- Arrow from Terraform to AWS -->
  <line x1="180" y1="72" x2="218" y2="72" stroke="#00897B" stroke-width="1.5" marker-end="url(#arrowteal)"/>
  <text x="186" y="66" font-size="9" fill="#666">provisions</text>

  <!-- AWS IAM Box -->
  <rect x="218" y="50" width="632" height="480" fill="#FFF8F0" stroke="#FF9900" stroke-width="2" rx="10"/>
  <text x="238" y="74" font-size="13" font-weight="bold" fill="#E65100">AWS IAM</text>

  <!-- ===== LEFT COLUMN: User + Group ===== -->

  <!-- IAM User -->
  <rect x="240" y="88" width="180" height="70" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="6"/>
  <text x="330" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">IAM User</text>
  <text x="330" y="130" text-anchor="middle" font-size="10" fill="#444">Name: dev-user</text>
  <text x="330" y="146" text-anchor="middle" font-size="10" fill="#666">Output: user_arn</text>

  <!-- Arrow: User to Group Membership -->
  <line x1="330" y1="158" x2="330" y2="192" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <text x="338" y="178" font-size="9" fill="#888">added to</text>

  <!-- Group Membership -->
  <rect x="240" y="192" width="180" height="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="6"/>
  <text x="330" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Group Membership</text>
  <text x="330" y="234" text-anchor="middle" font-size="10" fill="#444">dev-group-membership</text>
  <text x="330" y="248" text-anchor="middle" font-size="10" fill="#666">links user to group</text>

  <!-- Arrow: Group Membership to Group -->
  <line x1="330" y1="252" x2="330" y2="286" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowgreen)"/>

  <!-- IAM Group -->
  <rect x="240" y="286" width="180" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="6"/>
  <text x="330" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">IAM Group</text>
  <text x="330" y="328" text-anchor="middle" font-size="10" fill="#444">Name: developers</text>
  <text x="330" y="344" text-anchor="middle" font-size="10" fill="#666">Output: group_name</text>

  <!-- Arrow: Group to Policy Attachment -->
  <line x1="330" y1="356" x2="330" y2="390" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowgreen)"/>
  <text x="338" y="376" font-size="9" fill="#888">attaches</text>

  <!-- Group Policy Attachment -->
  <rect x="240" y="390" width="180" height="60" fill="#FFF9C4" stroke="#F9A825" stroke-width="2" rx="6"/>
  <text x="330" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#F57F17">Policy Attachment</text>
  <text x="330" y="432" text-anchor="middle" font-size="10" fill="#444">Group + S3ReadOnlyPolicy</text>
  <text x="330" y="446" text-anchor="middle" font-size="10" fill="#666">iam_group_policy_attachment</text>

  <!-- ===== CENTER: S3 Read-Only Policy ===== -->

  <rect x="460" y="260" width="200" height="110" fill="#FCE4EC" stroke="#C62828" stroke-width="2" rx="6"/>
  <text x="560" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">S3 Read-Only Policy</text>
  <text x="560" y="302" text-anchor="middle" font-size="10" fill="#444">Name: S3ReadOnlyPolicy</text>
  <text x="560" y="318" text-anchor="middle" font-size="10" fill="#444">Actions: s3:Get*, s3:List*</text>
  <text x="560" y="334" text-anchor="middle" font-size="10" fill="#444">Effect: Allow</text>
  <text x="560" y="350" text-anchor="middle" font-size="10" fill="#666">Resource: * (all S3)</text>

  <!-- Arrow: Policy to Group Attachment -->
  <line x1="460" y1="340" x2="420" y2="420" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowred)"/>

  <!-- Arrow: Policy to Role Attachment -->
  <line x1="560" y1="370" x2="560" y2="404" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowred)"/>

  <!-- ===== RIGHT COLUMN: EC2 Role ===== -->

  <!-- IAM Role -->
  <rect x="690" y="88" width="140" height="110" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2" rx="6"/>
  <text x="760" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#6A1B9A">IAM Role</text>
  <text x="760" y="130" text-anchor="middle" font-size="10" fill="#444">ec2-read-s3-role</text>
  <text x="760" y="148" text-anchor="middle" font-size="10" fill="#444">Principal:</text>
  <text x="760" y="164" text-anchor="middle" font-size="10" fill="#444">ec2.amazonaws.com</text>
  <text x="760" y="180" text-anchor="middle" font-size="10" fill="#666">Action: sts:AssumeRole</text>

  <!-- Arrow: Role to Role Policy Attachment -->
  <line x1="760" y1="198" x2="760" y2="404" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrowpurple)"/>

  <!-- Role Policy Attachment -->
  <rect x="680" y="404" width="160" height="70" fill="#EDE7F6" stroke="#7B1FA2" stroke-width="2" rx="6"/>
  <text x="760" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#6A1B9A">Role Attachment</text>
  <text x="760" y="446" text-anchor="middle" font-size="10" fill="#444">ec2-read-s3-role</text>
  <text x="760" y="462" text-anchor="middle" font-size="10" fill="#666">+ S3ReadOnlyPolicy</text>

  <!-- EC2 Instance -->
  <rect x="680" y="256" width="160" height="80" fill="#FF9900" fill-opacity="0.15" stroke="#FF9900" stroke-width="2" rx="6"/>
  <text x="760" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">EC2 Instance</text>
  <text x="760" y="300" text-anchor="middle" font-size="10" fill="#444">Assumes IAM Role</text>
  <text x="760" y="316" text-anchor="middle" font-size="10" fill="#444">Inherits S3 read access</text>
  <text x="760" y="330" text-anchor="middle" font-size="10" fill="#666">via sts:AssumeRole</text>

  <!-- Arrow: Role to EC2 -->
  <line x1="760" y1="198" x2="760" y2="256" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrowpurple)"/>

  <!-- S3 Bucket (result) -->
  <rect x="440" y="90" width="200" height="80" fill="#E0F7FA" stroke="#00838F" stroke-width="2" rx="6"/>
  <text x="540" y="116" text-anchor="middle" font-size="12" font-weight="bold" fill="#006064">S3 Bucket</text>
  <text x="540" y="134" text-anchor="middle" font-size="10" fill="#444">Accessible via policy</text>
  <text x="540" y="150" text-anchor="middle" font-size="10" fill="#444">Actions: Get* List*</text>
  <text x="540" y="164" text-anchor="middle" font-size="10" fill="#666">Read-only access enforced</text>

  <!-- Arrow: Group Attachment to S3 -->
  <line x1="420" y1="415" x2="476" y2="180" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowyellow)"/>

  <!-- Arrow: EC2 to S3 -->
  <line x1="680" y1="290" x2="640" y2="160" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arroworange)"/>
  <text x="668" y="224" font-size="9" fill="#E65100">reads S3</text>

  <!-- Outputs box -->
  <rect x="240" y="476" width="590" height="40" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="6"/>
  <text x="535" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">Terraform Outputs:</text>
  <text x="535" y="509" text-anchor="middle" font-size="10" fill="#444">user_arn  |  group_name  |  role_arn</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowteal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00897B"/>
    </marker>
    <marker id="arrowblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2E7D32"/>
    </marker>
    <marker id="arrowred" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C62828"/>
    </marker>
    <marker id="arrowpurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7B1FA2"/>
    </marker>
    <marker id="arroworange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9900"/>
    </marker>
    <marker id="arrowyellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F9A825"/>
    </marker>
  </defs>

</svg>
